name: Build JAR

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CelestCombat-Pro-build-${{ github.run_number }}
          path: build/libs/*.jar
          retention-days: 30

      - name: Comment on PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ **Build Successful**\n\nThe plugin compiled successfully and the JAR artifact is ready for testing."
            })

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build.result == 'success'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: CelestCombat-Pro-build-${{ github.run_number }}
          path: build/libs

      - name: Get Commit Info
        id: commit
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "build=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Dev Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-build-${{ github.run_number }}
          name: Dev Build ${{ github.run_number }}
          files: build/libs/*.jar
          prerelease: true
          body: |
            🚧 **Development Build**

            **Branch:** ${{ steps.commit.outputs.branch }}
            **Commit:** ${{ steps.commit.outputs.commit }}
            **Build Number:** ${{ steps.commit.outputs.build }}

            ⚠️ This is an automated development build and may contain bugs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
