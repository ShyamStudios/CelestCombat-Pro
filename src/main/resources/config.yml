# TIME FORMAT GUIDE
# Simple formats: 20s (20 seconds), 5m (5 minutes), 1h (1 hour)
# Complex format: 1d_2h_30m_15s (1 day, 2 hours, 30 minutes, 15 seconds)
# Units: s = seconds, m = minutes, h = hours, d = days, w = weeks, mo = months, y = years

#---------------------------------------------------
#               General Settings
#---------------------------------------------------
# Enable or disable debug mode (provides verbose console output)
debug: false

#---------------------------------------------------
#              EVENT PRIORITY SETTINGS
#---------------------------------------------------
# Configure event handler priorities to resolve conflicts with other plugins
# Available priorities: LOWEST, LOW, NORMAL, HIGH, HIGHEST
# LOWEST runs first, HIGHEST runs last
# Use LOWEST/LOW to block events before other plugins process them
# Use HIGH/HIGHEST to process events after other plugins
#
# IMPORTANT: After changing priorities, use /celestcombat reload to apply changes
# Use /celestcombat eventpriority to view current priorities
event_priorities:
  # Command blocking priority - use LOW to block commands before GUI plugins like EssentialsX GUI
  # If you have issues with command bypasses, try LOWEST
  command_blocking: "LOW"
  
  # Combat damage event priority - usually HIGH is good for compatibility
  combat_damage: "HIGH"
  
  # Player movement event priority - HIGH recommended for performance
  player_movement: "HIGH"
  
  # Teleportation event priority - HIGH recommended to override other plugins
  teleportation: "HIGH"
  
  # Item usage event priority - HIGH recommended for proper blocking
  item_usage: "HIGH"
  
  # Flight control event priority - HIGH recommended
  flight_control: "HIGH"

#---------------------------------------------------
#              CORE COMBAT SETTINGS
#---------------------------------------------------
combat:
  # Combat tag duration
  duration: 20s

  # Command blocking mode: "blacklist" or "whitelist"
  # whitelist - blocks all commands EXCEPT those listed in 'allowed_commands'
  # blacklist - blocks only commands listed in 'blocked_commands'
  command_block_mode: "blacklist"

  # Commands blocked during combat (used in blacklist mode)
  blocked_commands:
    - "logout"
    - "tpa"
    - "tpahere"
    - "afk"
    - "spawn"
    - "tpaccept"
    - "tpacancel"
    - "rtp"
    - "warp"
    - "home"
    - "team"
    - "enderchest"
    - "ec"
    - "vanish"
    - "v"

  # Commands allowed during combat (used in whitelist mode)
  allowed_commands:
    - "msg"
    - "r"
    - "reply"
    - "tell"
    - "w"
    - "whisper"
    - "shop"
    - "buy"
    - "sell"
    - "ah"

  # If true, players kicked/banned by admins won't be punished (killed) for combat logging
  exempt_admin_kick: true

  # Disable flight (Creative fly) during combat
  disable_flight: false

  # Items blocked during combat (Foods, Potions, Elytra)
  item_restrictions:
    # Enable or disable item restrictions during combat
    enabled: true
    # Items blocked during combat (Foods, Potions, Elytra)
    disabled_items:
      - CHORUS_FRUIT
      - ELYTRA

#---------------------------------------------------
#         ENDER PEARL COOLDOWN SYSTEM
#---------------------------------------------------
# This controls cooldowns on ender pearl usage
# This is SEPARATE from glitch prevention below
enderpearl:
  # Refresh combat timer when player lands an ender pearl
  refresh_combat_on_land: false

enderpearl_cooldown:
  # Enable/disable ender pearl cooldowns
  enabled: true

  # Cooldown duration
  duration: 10s

  # Only apply cooldowns during combat
  in_combat_only: true

  # Per-world settings (overrides global setting)
  worlds:
    minigames: false  # Example: cooldowns disabled in minigames world

#---------------------------------------------------
#         ENDER PEARL GLITCH PREVENTION
#---------------------------------------------------
# This prevents various ender pearl exploits and glitches
# This is SEPARATE from cooldown system above
enderpearl_fix:
  # Master toggle for all ender pearl glitch fixes
  enabled: true
  
  # 1 Block Clip / Wall Phase Glitch Prevention
  # Players throw pearl close to wall/fence to clip through blocks
  # Example: [Wall][Wall] ↑ Player throws pearl here to clip through
  prevent_block_stuck: true
  
  # 2 Micro Teleport Glitch Prevention  
  # Players throw pearl very close to themselves (0.2 blocks) to bypass anti-cheat
  # Example: Player moves 0.2 blocks into wall using micro teleport
  prevent_micro_teleport: true
  
  # Minimum distance required for teleportation (in blocks)
  # Teleports shorter than this will be cancelled
  # Recommended: 1.0-1.5 for PvP servers
  min_teleport_distance: 1.2
  
  # 3 Barrier / Protected Region Glitch Prevention
  # Players pearl through barrier blocks, bedrock, into WorldGuard regions
  # Example: [Barrier][Barrier][Barrier] ↑ pearl lands here to bypass protection
  prevent_barrier_glitch: true
  
  # Radius to check for problematic blocks around destination
  # Plugin scans nearby blocks for: barrier, bedrock, protected blocks
  # Higher values = more thorough checking but slightly more CPU usage
  # Recommended: 2-3 for most servers
  max_block_check_radius: 3
  
  # 4 Tight Space / Suffocation Glitch Prevention
  # Prevents pearling into spaces surrounded by too many solid blocks
  prevent_tight_spaces: true
  
  # How many solid blocks around the destination triggers prevention
  # Higher = more strict (6-8 recommended for PvP)
  max_surrounding_blocks: 6
  
  # Per-world settings for glitch fixes
  worlds:
    world: true
    world_nether: true
    world_the_end: true
    minigames: false

#---------------------------------------------------
#              TRIDENT RESTRICTIONS
#---------------------------------------------------
trident:
  # Refresh combat timer when trident lands (similar to enderpearl)
  refresh_combat_on_land: false

  # Worlds where tridents are completely banned
  banned_worlds:
    world_nether: true # Example: tridents banned in the nether
    # Add more worlds as needed

# Trident cooldown configuration
trident_cooldown:
  # Enable/disable trident cooldowns globally
  enabled: true

  # Cooldown duration (supports: s, m, h, d for seconds, minutes, hours, days)
  duration: "10s"

  # Only apply cooldown when player is in combat
  in_combat_only: true

  # Per-world cooldown settings (overrides global enabled setting)
  worlds:
    world: true          # Enable cooldown in overworld
    world_nether: false  # Disable cooldown in nether
    world_the_end: true  # Enable cooldown in end
    # Add more worlds as needed


#---------------------------------------------------
#                  DEATH EFFECTS
#---------------------------------------------------
death_animation:
  # Master toggle for death animations
  enabled: true

  # Only show animations for player kills
  only_player_kill: true

  # Animation types (random selection if multiple enabled)
  animation:
    lightning: true
    fire_particles: true

# ---------------------------------------------------
#                  KILL REWARDS
# ---------------------------------------------------
kill_rewards:
  # Master toggle for kill rewards
  enabled: true

  # Commands executed when player gets a kill
  # Variables: %killer% = killer's name, %victim% = victim's name
  commands:
    - "donutcratecore shards give %killer% 10"
    # add more commands as needed

  cooldown:
    # Global cooldown system
    # If true, killing any player puts ALL kill rewards on cooldown for this player
    # This means after one kill, the player must wait before earning rewards from ANY kill
    use_global_cooldown: false

    # Duration for global cooldown (only used if use_global_cooldown is true)
    # Supports: s (seconds), m (minutes), h (hours), d (days)
    # Examples: 30s, 5m, 2h, 1d
    duration: 1d

    # Same-player cooldown system
    # If true, cooldowns are tracked per victim (player can kill different players for rewards)
    # If false, no same-player cooldowns are enforced
    # Note: use_global_cooldown takes priority over this setting
    use_same_player_cooldown: true

    # Duration for same-player cooldowns (only used if use_same_player_cooldown is true)
    # This is how long a player must wait before earning rewards from killing the SAME victim again
    same_player_duration: 1d

#---------------------------------------------------
#              NEW PLAYER PROTECTION
#---------------------------------------------------
newbie_protection:
  # Enable/disable the newbie protection system
  enabled: true

  # Duration of protection for new players
  # Formats: 10s, 5m, 1h, 30m, etc.
  duration: 10m

  # Protection settings
  protect_from_pvp: true      # Protect from player vs player damage
  protect_from_mobs: false    # Protect from mob damage

  # Removal conditions
  remove_on_damage_dealt: true    # Remove protection when player deals damages to another player

  # Display settings
  display:
    use_bossbar: true
    use_actionbar: false

    bossbar:
      title: "&#4CAF50PvP Protection: &#FFFFFF%time%"
      color: "GREEN"      # BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW
      style: "SOLID"      # SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20

  # World-specific settings (optional)
  # If not specified, protection is enabled in all worlds
  worlds:
    world: true           # Enable protection in 'world'
    world_nether: false   # Disable protection in 'world_nether'
    world_the_end: false  # Disable protection in 'world_the_end'

#---------------------------------------------------
#              WORLDGUARD INTEGRATION
#---------------------------------------------------
# WorldGuard's barrier for no-pvp regions
safezone_protection:
  # Enable/disable WorldGuard integration for safezone barriers
  # This will prevent players from entering safezones while in combat
  enabled: true

  # Block type for the barrier
  # Set "BARRIER" for invisible but solid barrier
  # Valid materials can be found at: https://jd.papermc.io/paper/1.21.5/org/bukkit/Material.html
  barrier_material: "RED_STAINED_GLASS"

  # How close the player to borders before barriers appear
  barrier_detection_radius: 5 # blocks

  # How tall the barriers are
  barrier_height: 3

  # Push force when player accidentally go inside the barrier blocks
  # Higher values = stronger push back, lower values = gentler push
  push_back_force: 0.6

  # Per-world configuration
  # You can enable/disable safezone protection for specific worlds
  # If a world is not listed here, it will use the global 'enabled' setting above
  # Setting correctly will help save server performance
  worlds:
    # Example configurations:
    spawn_world: true          # Enable in spawn world
    world: true          # Enable in the main world
    world_nether: false  # Disable in the nether
    world_the_end: false  # Disable in the end
    # Add more worlds as needed

#---------------------------------------------------
#            GRIEFPREVENTION INTEGRATION
#---------------------------------------------------
claim_protection:
  # Enable/disable GriefPrevention integration for claim barriers
  # This will prevent players in combat from entering protected claims
  enabled: false

  # Block type for the barrier around protected claims
  # Set "BARRIER" for invisible but solid barrier
  # Valid materials can be found at: https://jd.papermc.io/paper/1.21.5/org/bukkit/Material.html
  barrier_material: "BLUE_STAINED_GLASS"

  # How close the player needs to be to claim borders before barriers appear
  barrier_detection_radius: 5 # blocks

  # How tall the barriers are (blocks high from player level)
  barrier_height: 3

  # Push force when player tries to enter a protected claim
  # Higher values = stronger push back, lower values = gentler push
  push_back_force: 0.6

  # Player claim's permission to bypass claim barriers (player can enter claims while in combat)
  # EDIT - Can edit claims settings for admins (not recommended for regular players)
  # MANAGE - Can manage claim settings (most restrictive)
  # BUILD - Can place/break blocks in the claim (default, good balance)
  # CONTAINER - Can access containers inventory in the claim (least restrictive)
  # ACCESS - Can access the claim's bed, buttons and levers (recommended for most cases)
  required_permission: BUILD

  # Per-world configuration
  # You can enable/disable claim protection for specific worlds
  # If a world is not listed here, it will use the global 'enabled' setting above
  # Setting correctly will help save server performance
  worlds:
    # Example configurations:
    world: true                # Enable in the main world
    world_nether: true        # Enable in the nether
    world_the_end: false       # Disable in the end
    # Add more worlds as needed

    #---------------------------------------------------
#              UXM CLAIMS PROTECTION
#---------------------------------------------------
# Full integration with UXM Claims plugin (Paid Plugin Compatible)
# Requires UXM Claims: https://builtbybit.com/resources/uxmclaims-all-in-one-claim-plugin.86890/
uxm_claims_protection:
  # Master toggle for UXM Claims integration
  enabled: true
  
  # === COMBAT ENTRY PREVENTION ===
  # Prevent players in combat from ENTERING claims (like GriefPrevention)
  # When a combat player tries to enter a claim, they are pushed back
  prevent_claim_entry: true
  
  # === COMBAT INSIDE CLAIMS ===
  # Prevent players from STARTING combat inside claims
  # Blocks PvP damage when either player is inside a claim
  prevent_combat_in_claims: true
  
  # === OWNER/TRUSTED COMBAT ===
  # Allow claim owners/trusted players to fight in their own claims
  # If true, owners and members can fight in their claims even if prevent_combat_in_claims is true
  allow_owner_combat: false
  
  # Allow trusted members to fight each other in claims
  allow_trusted_combat: false
  
  # === MOVEMENT RESTRICTIONS ===
  # Force applied to push players back from claim borders
  # Higher = stronger push (0.3-1.0 recommended)
  push_back_force: 0.6
  
  # Prevent teleportation into claims during combat (ender pearls, /tp, etc.)
  prevent_teleport_entry: true
  
  # === ITEM RESTRICTIONS ===
  # Block specific items from being used in claims during combat
  block_combat_items:
    enabled: true
    items:
      - ENDER_PEARL
      - CHORUS_FRUIT
      - TOTEM_OF_UNDYING
  
  # === COMMAND RESTRICTIONS ===
  # Block commands when in combat inside claims
  block_commands_in_claims: true
  blocked_commands:
    - "home"
    - "spawn"
    - "warp"
    - "tpa"
    - "back"
  
  # === FLIGHT RESTRICTIONS ===
  # Disable flight when entering claims during combat
  disable_flight_in_claims: true
  
  # === MESSAGING SYSTEM ===
  # Send message when player is blocked from entering claim
  send_entry_blocked_message: true
  
  # Send message when combat is blocked in claim
  send_combat_blocked_message: true
  
  # Send message when teleportation is blocked
  send_teleport_blocked_message: true
  
  # Cooldown between messages (in seconds) to prevent spam
  message_cooldown: 2
  
  # === CLAIM TYPES ===
  # Different rules for different claim types
  claim_types:
    # Admin claims (created by admins)
    admin_claims:
      prevent_entry: true
      prevent_combat: true
      allow_owner_combat: false
    
    # Player claims (created by players)
    player_claims:
      prevent_entry: true
      prevent_combat: true
      allow_owner_combat: false
    
    # Public claims (open to everyone)
    public_claims:
      prevent_entry: false
      prevent_combat: false
      allow_owner_combat: true
  
  # === PER-WORLD SETTINGS ===
  # Per-world settings (overrides global enabled setting)
  worlds:
    world: true          # Enable in overworld
    world_nether: false  # Disable in nether (allow PvP)
    world_the_end: true  # Enable in end
    pvp_world: false     # Disable in dedicated PvP world
    minigames: false     # Disable in minigames world
    # Add more worlds as needed
  
  # === PERFORMANCE OPTIMIZATION ===
  # Advanced: Cache settings for performance optimization
  cache:
    # Enable caching of claim lookups (recommended for large servers)
    enabled: true
    # How long to cache claim results (in milliseconds)
    ttl: 10000
    # Maximum cache size before cleanup
    max_size: 1000
    # Clean cache every X milliseconds
    cleanup_interval: 30000
  
  # === INTEGRATION OPTIONS ===
  # Integration with other protection plugins
  integration:
    # Respect WorldGuard regions (if both are present)
    respect_worldguard: true
    # Respect GriefPrevention claims (if both are present)  
    respect_griefprevention: true
    # Priority when multiple protection plugins are active
    # Higher number = higher priority
    priority: 10
